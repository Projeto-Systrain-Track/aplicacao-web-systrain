<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sys Train Track | Linhas</title>
    <link rel="stylesheet" href="estilo.css" />
    <script src="../js/sessao.js"></script>
    <link rel="icon" href="../assets/icons/logo.svg" />
  </head>

  <body>
    <div class="container-sys">
      <aside class="nav-lateral desktop">
        <div class="logo">
          <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" />
        </div>

        <nav class="links">
          <a class="link-lateral" href="dashboard.html">Visão geral</a>
          <a class="link-lateral ativo" href="#">Linhas</a>
          <a class="link-lateral" href="incidentes.html">Incidentes</a>
          <a class="link-lateral" href="relatorios.html">Relatórios</a>
        </nav>

        <div class="opcoes">
          <div class="btn-lateral" id="nome_user">
        
          </div>

          <button onclick="limparSessao()" class="btn-lateral">
            <p>Sair</p>
          </button>
        </div>
      </aside>

      <main class="conteudo">
        <section class="topo-pagina">
          <div>
            <p class="subtitulo">Monitoramento</p>
            <h1 class="titulo">Linhas Monitoradas</h1>
            <p class="descricao">Resumo das linhas monitoradas pelo sistema.</p>
          </div>
        </section>

        <section class="painel-mapa">
          <table class="tabela-linhas">
            <thead>
              <tr>
                <th>Linha</th>
                <th>Trecho</th>
                <th>Status</th>
                <th>Estações</th>
                <th>Incidentes</th>
                <th>Disponibilidade</th>
              </tr>
            </thead>

            <tbody id="tabelaLinhas"></tbody>
          </table>
        </section>
      </main>

<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sys Train Track | Relatórios</title>
  <link rel="stylesheet" href="../assets/css/estilo_dash.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/sessao.js"></script>
  <!-- <script src="./relatorio.js"></script> -->
  <link rel="icon" href="../assets/icons/logo.svg" />
</head>

<body>
  <div id="loading">
    <img src="../assets/gifs/loading.gif" alt="Carregando...">
  </div>
  <div id="container_sys" class="container-sys" style="display: none;">
    <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
    <div class="nav-hamburguer">
      <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
      <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
        onclick="abrirSideBarMobile()">
    </div>

    <aside class="nav-lateral desktop" id="nav_lateral">
      <div class="cont-icon-sidebar">
        <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
      </div>
      <div class="logo">
        <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
      </div>

      <nav class="links" id="links_sidebar"></nav>

      <div class="opcoes">
        <div class="btn-lateral usuario">
          <img src="../assets/icons/icon-avatar-masc.png" alt="">
          <div class="cont-user">
            <p id="cargo_user"></p>
            <p id="nome_user"></p>
          </div>

        </div>
        <button onclick="limparSessao()" class="btn-lateral">
          <img src="../assets/icons/icon-logout-white.png" alt="">
          <p>Sair</p>
        </button>
      </div>
    </aside>

    <main class="conteudo" id="conteudo_pagina">
      <section class="topo-pagina">
        <div>
          <p class="subtitulo">Monitoramento</p>
          <h1 class="titulo">Relatórios</h1>
          <p class="descricao">Indicadores gerais do sistema.</p>
        </div>
      </section>
      <section>
        <div class="painel-reatorio-linhas" id="painelCardLinhas">
        </div>
      </section>
      <section class="painel-mapa">



      </section>
    </main>
  </div>

</body>


</html>
<script src="./relatorios.js"></script>

<script>
  sessionStorage.TIPO_USUARIO = "Gerente de operações"
  function validarTipoUsuario() {
    var links_sidebar = document.getElementById("links_sidebar")
    if (sessionStorage.TIPO_USUARIO == "Gerente de operações") {

      links_sidebar.innerHTML = `
          <a class="link-lateral " href="dashboard.html">
            <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
            <span>Visão geral</span>
          </a>
          <a class="link-lateral" href="linhas.html">
            <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
            <span>Linhas</span>
          </a>
          <a class="link-lateral " href="servidores.html">
            <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
            <span>Servidores</span>
          </a>
          <a class="link-lateral " href="incidentes.html">
            <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
            <span>Incidentes</span>
          </a>
          <a class="link-lateral" href="operacao.html">
            <img class="icon-sidebar" src="../assets/icons/icon-operacao-white.png" alt="">
            <span>Operação</span>
          </a>
          <a class="link-lateral ativo" href="relatorios.html">
            <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
            <span>Relatórios</span>
          </a>
          <a class="link-lateral " href="usuarios.html">
            <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
            <span>Usuários</span>
          </a>
      `
      setTimeout(() => {
        document.getElementById("container_sys").style.display = "flex"
        document.getElementById("loading").style.display = "none"
      }, 500);
    } else if (sessionStorage.TIPO_USUARIO == "Operador") {
      setTimeout(() => {
        window.location = "dashboard.html"
      }, 500);
    } else if (sessionStorage.TIPO_USUARIO == "Coordenador de incidentes") {

      links_sidebar.innerHTML = `          
          <a class="link-lateral " href="dashboard.html">
            <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
            <span>Visão geral</span>
          </a>
          <a class="link-lateral " href="incidentes.html">
            <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
            <span>Incidentes</span>
          </a>
          <a class="link-lateral ativo" href="relatorios.html">
            <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
            <span>Relatórios</span>
          </a>
      `
      setTimeout(() => {
        document.getElementById("container_sys").style.display = "flex"
        document.getElementById("loading").style.display = "none"
      }, 500);
    } else {
      window.location = "../index.html"
    }
  }


  validarTipoUsuario()
  document.getElementById("cargo_user").innerHTML = sessionStorage.TIPO_USUARIO
  document.getElementById("nome_user").innerHTML = sessionStorage.NOME_USUARIO

  window.addEventListener("resize", function () {
    var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
    var sidebar = document.getElementById("nav_lateral")

    if (window.innerWidth > 900) {
      if (fundo_cinza_sidebar.classList.contains("mobile")) {
        console.log("Tem a classe mobile");
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
      }
    }
  });

  function abrirSideBarMobile() {
    var sidebar = document.getElementById("nav_lateral")
    var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
    sidebar.classList.toggle("mobile")
    fundo_cinza_sidebar.classList.toggle("mobile")
  }
  function fecharSidebar() {

    var sidebar = document.getElementById("nav_lateral")
    var conteudo = document.getElementById("conteudo_pagina")
    sidebar.classList.toggle("compactada")
    conteudo.classList.toggle("expandido")
  }



  async function buscarLinhas() {

    var idEmpresa = sessionStorage.ID_EMPRESA

    try {
      var resposta = await fetch(`/linha/listarLinhasEmpresa/${idEmpresa}`)
      console.log("RESPOSTA: ", resposta);
      var resposta_json = await resposta.json()
      console.log("RESPOSTA: ", resposta_json);
      mostrarLinha(resposta_json)
    } catch (error) {
      console.log("Erro: ", error);
    }
  }

  buscarLinhas()


  function mostrarLinha(linhas) {
    var container_cards = document.getElementById("painelCardLinhas")
    var elementos_html = '';
    for (var i = 0; i < linhas.length; i++) {
      var classeStatus = "";
      var linha = linhas[i]
      if (linha.status == "Operando") {
        classeStatus = "status-operando";
      } else if (linha.status == "Atenção") {
        classeStatus = "status-atencao";
      } else {
        classeStatus = "status-monitoramento";
      }
      elementos_html += `
            <div class="card-linha">
                <div class="card-incidente-topo">
                <div class="incidente-linha">
                    <span class="linha-cor-bolinha" style="background-color: ${linha.corLinha};"></span>
                    <span>Linha ${linha.numeroLinha} - ${linha.nomeLinha}</span>
                </div>
                <span class="nivel-badge ${classeStatus}">
                    ${linha.status}
                </span>
                </div>
                <div class="card-incidente-conteudo">
                  <div class="card-incidente-infos card-relatorio">
                    <h3>Descrição:</h3>
                    <div>
                        <span>Trecho: ${linha.trecho}</span>
                    </div>
                </div>
                </div>
                <div class="card-relatorio-rodape">
                    <div class="linha-cor-barra" style="background-color: ${linha.corLinha};">
                    </div>
                    <div class="card-infos-rodape">
                        <button class="btn-relatorio" onclick="gerarRelatorio('${linha.idLinha}', '${linha.nomeLinha}')">Gerar Relatório</button>
                    </div>
                </div>
            </div>
         `
    }
    console.log(container_cards)
    container_cards.innerHTML = elementos_html
  }

  async function gerarRelatorio(idLinha, nomeLinha) {
    try {
      var resposta_relatorio = await fetch(`/relatorio/gerar`, {
        method: "POST", headers: { "Content-Type": "application/json", },
        body: JSON.stringify({
          idEmpresaServer: sessionStorage.ID_EMPRESA,
          nomeEmpresaServer: sessionStorage.NOME_EMPRESA,
          idLinhaServer: idLinha,
          nomeLinhaServer: nomeLinha,
          emailUsuarioServer: sessionStorage.EMAIL_USUARIO,
        })
      })


      var blob = await resposta_relatorio.blob()
      var url = URL.createObjectURL(blob)
      var link = document.createElement('a')
      link.href = url
      link.download = `relatorio_${nomeLinha}.pdf`
      link.click()
      URL.revokeObjectURL(url)
    } catch (error) {
      console.log("ERRO:", error);

    }

  }

</script>

    function carregarDados() {
        const params = new URLSearchParams(window.location.search);
        const idLinha = Number(params.get("id"));

        console.log("ID DA LINHA:", idLinha);

        if (!idLinha) {
            console.error("ID da linha inválido ou não enviado na URL.");
            document.getElementById("tituloLinha").innerHTML = "Linha não encontrada";
            return;
        }

        let incidentesDaLinha = [];

        console.log("Linha selecionada:", idLinha);

        fetch(`/linha/incidentes/${idLinha}`)
            .then(res => {
                if (!res.ok) {
                    throw new Error("Erro ao buscar incidentes da linha");
                }

                return res.json();
            })

            // RETORNO PARA TESTE -> REMOVER AO CORRIGIR PROBLEMA
            .then(incidentes => {
                console.log("RETORNO BRUTO INCIDENTES:");
                console.log(JSON.stringify(incidentes, null, 2));

                return incidentes;
            })

            .then(incidentes => {

                incidentesDaLinha = Array.isArray(incidentes) ? incidentes : [];

                console.log("INCIDENTES RECEBIDOS DA API:");
                console.table(incidentesDaLinha);

                return fetch(`/linha/detalhe/${idLinha}`);

            })
            .then(res => {
                if (!res.ok) {
                    throw new Error("Erro ao buscar detalhes da linha");
                }

                return res.json();
            })

            .then(dados => {

                console.log(dados);

                // var linha = dados.empresas[0].linhas[0];
                var linha = dados;

                document.getElementById("tituloLinha").innerHTML =
                    `Linha ${linha.numero_linha} - ${linha.nome_linha}`;

                var servidores = linha.rbc.map(rbc => {
                    

                    // var leitura = rbc.ultimas_leituras[0];
                    var leitura = rbc.ultimas_leituras[rbc.ultimas_leituras.length - 1];

                    var status = "Online";

                    if (rbc.status_atual == "OFFLINE") {
                        status = "Offline";
                    } else if (
                        leitura.cpu.percentual_uso_cpu >= 80 ||
                        leitura.memoria.percentual_uso_ram >= 80 ||
                        leitura.disco.percentual_uso_disco >= 80 ||
                        leitura.latencia_ping_ms >= 120
                    ) {
                        status = "Crítico";
                    }

                    return {

                        nome: rbc.nome_rbc,

                        status: status,

                        cpu: Math.round(leitura.cpu.percentual_uso_cpu),

                        ram: Math.round(leitura.memoria.percentual_uso_ram),

                        disco: Math.round(leitura.disco.percentual_uso_disco),

                        latencia: leitura.latencia_ping_ms + "ms"

                    };

                });

                var servidoresOnline = servidores.filter(s => s.status != "Offline").length;

                var servidorMaisCritico = null;

                var maiorScore = -1;

                servidores.forEach(s => {

                    var score =
                        (s.cpu * 0.35) +
                        (s.ram * 0.30) +
                        (s.disco * 0.20) +
                        (parseInt(s.latencia) * 0.15);

                    if (score > maiorScore) {

                        maiorScore = score;

                        servidorMaisCritico = s;

                    }

                });

                var dadosTela = {

                    servidoresAtivos: servidoresOnline,

                    statusSistema: (() => {

                        var possuiOffline = servidores.some(s => s.status == "Offline");
                        var possuiCritico = servidores.some(s => s.status == "Crítico");
                        var possuiDegradado = servidores.some(s => s.status == "Degradado");

                        if (possuiOffline) {
                            return "Operação Parada";
                        }

                        if (possuiCritico) {
                            return "Operação Crítica";
                        }

                        if (possuiDegradado) {
                            return "Operação Instável";
                        }

                        return "Operação Normal";

                    })(),

                    servidorCritico:
                        servidorMaisCritico
                            ? servidorMaisCritico.nome
                            : "N/A",

                    incidentesAbertos: incidentesDaLinha.length,

                    resumo: [

                        {
                            nome: "CPU elevada",
                            valor: incidentesDaLinha.filter(
                                i => i.componente_afetado == "CPU"
                            ).length
                        },

                        {
                            nome: "RAM elevada",
                            valor: incidentesDaLinha.filter(
                                i => i.componente_afetado == "RAM"
                            ).length
                        },

                        {
                            nome: "Disco elevado",
                            valor: incidentesDaLinha.filter(
                                i => i.componente_afetado == "DISCO"
                            ).length
                        },

                        {
                            nome: "Latência elevada",
                            valor: incidentesDaLinha.filter(
                                i => i.componente_afetado == "LATENCIA"
                            ).length
                        },

                        {
                            nome: "Servidor offline",
                            valor: incidentesDaLinha.filter(
                                i => i.tipo_incidente == "OFFLINE"
                            ).length
                        }

                    ],

                    alertas: incidentesDaLinha.map(i => ({

                        tipo: i.componente_afetado,

                        msg: `${i.nome_rbc} - ${i.descricao}`

                    })),

                    servidores: servidores,

                    graficoIncidentes: []

                };

                // ==================================================================== \\

                // ===================== LÓGICA DE CORES DAS KPIS ===================== \\

                var corServidores = "bolinha-verde";

                if (servidoresOnline < servidores.length) {
                    corServidores = "bolinha-vermelha";
                }

                var corStatusSistema = "bolinha-verde";

                if (dadosTela.statusSistema == "Operação Parada") {
                    corStatusSistema = "bolinha-cinza";
                } else if (dadosTela.statusSistema == "Operação Crítica") {
                    corStatusSistema = "bolinha-vermelha";
                } else if (dadosTela.statusSistema == "Operação Instável") {
                    corStatusSistema = "bolinha-amarela";
                }

                var servidorCritico = dadosTela.servidores[0];
                var corServidorCritico = "bolinha-verde";

                if (!servidorCritico) {
                    servidorCritico = {
                        nome: "N/A",
                        status: "Offline"
                    };
                    corServidorCritico = "bolinha-cinza";
                } else if (servidorCritico.status == "Offline") {
                    corServidorCritico = "bolinha-cinza";
                } else if (servidorCritico.status == "Crítico") {
                    corServidorCritico = "bolinha-vermelha";
                } else if (servidorCritico.status == "Degradado") {
                    corServidorCritico = "bolinha-amarela";
                }

                var corIncidentes = "bolinha-verde";

                if (dadosTela.incidentesAbertos >= 2 && dadosTela.incidentesAbertos <= 5) {
                    corIncidentes = "bolinha-amarela";
                }

                if (dadosTela.incidentesAbertos > 5) {
                    corIncidentes = "bolinha-vermelha";
                }

                // ==================================================================== \\

                // ====================== RENDERIZAÇÃO DAS KPIS ======================= \\

                document.getElementById("servidorAtivo").innerHTML = `
                <div class="kpi-status">
                    <span class="bolinha-kpi ${corServidores}"></span>
                    ${servidoresOnline}/${servidores.length}
                </div>
            `;

                document.getElementById("statusSistema").innerHTML = `
                <div class="kpi-status">
                    <span class="bolinha-kpi ${corStatusSistema}"></span>
                    ${dadosTela.statusSistema}
                </div>
            `;

                document.getElementById("servidorCritico").innerHTML = `
                <div class="kpi-status">
                    <span class="bolinha-kpi ${corServidorCritico}"></span>
                    ${servidorCritico.nome}
                </div>
            `;

                document.getElementById("incidentesAbertos").innerHTML = `
                <div class="kpi-status mb-1">
                    <span class="bolinha-kpi ${corIncidentes}"></span>
                    ${dadosTela.incidentesAbertos}
                </div>
            `;

                // ==================================================================== \\

                // ============================= TOOLTIPS ============================= \\

                const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

                const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl =>
                    new bootstrap.Tooltip(tooltipTriggerEl)
                );

                // ==================================================================== \\

                const listaResumo = document.getElementById("listaResumo");

                listaResumo.innerHTML = "";

                dadosTela.resumo.forEach(item => {

                    let cor = "bolinha-verde";

                    if (item.nome === "Servidor offline") {

                        if (item.valor > 0) {
                            cor = "bolinha-cinza";
                        }

                    } else {

                        if (item.valor > 0) {
                            cor = "bolinha-amarela";
                        }

                        if (item.valor >= 3) {
                            cor = "bolinha-vermelha";
                        }

                    }

                    listaResumo.innerHTML += `

                    <div class="d-flex justify-content-between align-items-center mb-2">

                        <div class="d-flex align-items-center gap-2">

                            <span class="bolinha-kpi ${cor}"></span>

                            ${item.nome}

                        </div>

                        <strong>${item.valor}</strong>

                    </div>

                `;

                });

                // ==================================================================== \\

                // ========== ALGORITMO DE ORDENAÇÃO DA TABELA DE SERVIDORES ========== \\

                dadosTela.servidores.sort((a, b) => {

                    function normalizar(status) {
                        return String(status || "")
                            .trim()
                            .toUpperCase()
                            .normalize("NFD")
                            .replace(/[\u0300-\u036f]/g, "");
                    }

                    const statusA = normalizar(a.status);
                    const statusB = normalizar(b.status);

                    // PRIORIDADE NUMÉRICA

                    function prioridade(status) {

                        if (status.includes("OFFLINE")) return 4;
                        if (status.includes("CRITIC")) return 3;
                        if (status.includes("DEGRAD")) return 2;
                        if (status.includes("ONLINE")) return 1;

                        return 0;
                    }

                    const prioridadeA = prioridade(statusA);
                    const prioridadeB = prioridade(statusB);

                    // STATUS

                    if (prioridadeA !== prioridadeB) {
                        return prioridadeB - prioridadeA;
                    }

                    // SCORE

                    const scoreA =
                        ((Number(a.cpu) || 0) * 0.35) +
                        ((Number(a.ram) || 0) * 0.30) +
                        ((Number(a.disco) || 0) * 0.20) +
                        ((parseInt(a.latencia) || 0) * 0.15);

                    const scoreB =
                        ((Number(b.cpu) || 0) * 0.35) +
                        ((Number(b.ram) || 0) * 0.30) +
                        ((Number(b.disco) || 0) * 0.20) +
                        ((parseInt(b.latencia) || 0) * 0.15);

                    return scoreB - scoreA;

                });

                document.getElementById("servidorCritico").innerHTML =
                    servidores.length > 0
                        ? servidores[0].nome
                        : "N/A";

                // ==================================================================== \\

                const listaAlertas = document.getElementById("listaALertas");

                listaAlertas.innerHTML = "";

                for (var i = 0; i < dadosTela.alertas.length; i++) {

                    var alerta = dadosTela.alertas[i];

                    listaAlertas.innerHTML += `

                        <div class="alerta-card mb-2">

                            <span class="badge bg-warning text-dark ms-3">
                                ${alerta.tipo}
                            </span>

                            ${alerta.msg}

                        </div>

                    `;

                }

                const tabela = document.getElementById("tabelaServidor");

                tabela.innerHTML = dadosTela.servidores.map(s => {
                    
                    let cor = "bg-success";
                    if (s.status === "Degradado") cor = "bg-warning";
                    if (s.status === "Crítico") cor = "bg-danger";
                    if (s.status === "Offline") cor = "bg-secondary";

                    return `
                        <tr onclick="irParaDetalhe('detalheServidor.html?idRbc=${s.idRbc}&nomeServidor=${s.nome}&macAdress=${s.macAdress}&numeroLinha=${s.numeroLinha}&trecho=${s.trecho}')">
                            <td>${s.nome}</td>
                            <td>
                                <span class="badge ${cor}">
                                    ${s.status}
                                </span>
                            </td>
                            <td>${barra(s.cpu)}</td>
                            <td>${barra(s.ram)}</td>
                            <td>${barra(s.disco)}</td>
                            <td>${s.latencia}</td>
                        </tr>
                    `;

                }).join('');

        })

            .catch(err => {
                console.error(err);
                document.getElementById("tituloLinha").innerHTML = "Erro ao carregar dashboard";
            });

    }

    function irDetalheServidor() {

        window.location = "detalheServidor.html"

    }

    function barra(valor) {

        var cor = "bg-success";

        if (valor > 70) cor = "bg-warning";
        if (valor > 85) cor = "bg-danger";

        return `

                <div class="fw-bolder" style="display: flex; justify-content: right; font-size: 12px;">
                    <span>${valor}%</span>
                </div>

                <div class="progress" style="height:10px;">

                    <div class="progress-bar-striped progress-bar-animated ${cor}" style="width:${valor}%"></div>

                </div>

            `;

    }

    </script>

<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sys Train Track | Dashboard</title>
    <link rel="icon" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="estilo.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/sessao.js"></script>
</head>

<body>
    <div id="loading">
        <img src="../assets/gifs/loading.gif" alt="Carregando...">
    </div>
    <div id="container_sys" class="container-sys" style="display: none;">
        <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
        <div class="nav-hamburguer">
            <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
            <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
                onclick="abrirSideBarMobile()">
        </div>

        <aside class="nav-lateral desktop" id="nav_lateral">
            <div class="cont-icon-sidebar">
                <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
            </div>
            <div class="logo">
                <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
            </div>

            <nav class="links" id="links_sidebar"></nav>

            <div class="opcoes">
                <div class="btn-lateral usuario">
                    <img src="../assets/icons/icon-avatar-masc.png" alt="">
                    <div class="cont-user">
                        <p id="cargo_user"></p>
                        <p id="nome_user"></p>
                    </div>

                </div>
                <button onclick="limparSessao()" class="btn-lateral">
                    <img src="../assets/icons/icon-logout-white.png" alt="">
                    <p>Sair</p>
                </button>
            </div>
        </aside>


        <main class="conteudo" id="conteudo_pagina">
            <section class="topo-pagina">
                <div>
                    <h2 class="titulo fw-bolder">Operação</h2>
                    <p class="descricao">Indicadores da operação.</p>
                    <p class="descricao">Última atualização: 20/04/2026 19:05</p>
                </div>
            </section>
            <div class="row g-4 mb-4 ">
                <div class="col-md-4 mb-2">
                    <div class="card-indicador position-relative">
                        <img src="../assets/icons/icon-operacao-laranja.png" class="icone-card" alt="Ícone">
                        <p>Impacto financeiro da indisponibilidade</p>
                        <strong id="impacto_financeiro">NHA</strong>
                    </div>
                </div>

                <div class="col-md-4 mb-2">
                    <div class="card-indicador position-relative">
                        <img src="./linhas/icon_linhas.png" class="icone-card" alt="Ícone">
                        <p>Linha com maior indisponibilidade</p>
                        <strong id="linhaMaiorIndisponibilidade">Linha 7 - Rubi</strong>
                    </div>
                </div>

                <div class="col-md-4 mb-2">
                    <div class="card-indicador position-relative">
                        <img src="./linhas/icon_alerta.png" class="icone-card" alt="Ícone">
                        <p>Principal causa de incidentes</p>
                        <strong id="causaIncidentes">CPU ALTA</strong>
                    </div>
                </div>
            </div>
        </main>
</body>

<script>
    function validarTipoUsuario() {
        var links_sidebar = document.getElementById("links_sidebar")
        if (sessionStorage.TIPO_USUARIO == "Gerente de operações") {
            links_sidebar.innerHTML = `
                <a class="link-lateral" href="dashboard.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>
                </a>
                <a class="link-lateral" href="linhas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>
                </a>
                <a class="link-lateral " href="servidores.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>
                </a>
                <a class="link-lateral" href="incidentes.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Incidentes</span>
                </a>
                <a class="link-lateral ativo" href="#">
                    <img class="icon-sidebar" src="../assets/icons/icon-operacao-white.png" alt="">
                    <span>Operação</span>
                </a>
                <a class="link-lateral" href="relatorios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
                    <span>Relatórios</span>
                </a>
                <a class="link-lateral " href="usuarios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuários</span>
                </a>
            `
            setTimeout(() => {
                document.getElementById("container_sys").style.display = "flex"
                document.getElementById("loading").style.display = "none"
            }, 500);
        } else if (sessionStorage.TIPO_USUARIO == "Operador") {
            links_sidebar.innerHTML = `
                <a class="link-lateral ativo" href="dashboard.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>
                </a>
                <a class="link-lateral" href="linhas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>
                </a>
                <a class="link-lateral " href="servidores.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>
                </a>
            `
            setTimeout(() => {
                document.getElementById("container_sys").style.display = "flex"
                document.getElementById("loading").style.display = "none"
            }, 500);
        } else if (sessionStorage.TIPO_USUARIO == "Coordenador de incidentes") {
            links_sidebar.innerHTML = `
                <a class="link-lateral ativo" href="dashboard.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>
                </a>
                <a class="link-lateral" href="incidentes.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Incidentes</span>
                </a>
                <a class="link-lateral" href="relatorios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
                    <span>Relatórios</span>
                </a>
            `
            setTimeout(() => {
                document.getElementById("container_sys").style.display = "flex"
                document.getElementById("loading").style.display = "none"
            }, 500);
        } else {
            setTimeout(() => {
                window.location = "../index.html"
            }, 500);
        }
    }
    validarTipoUsuario()
    document.getElementById("cargo_user").innerHTML = sessionStorage.TIPO_USUARIO
    document.getElementById("nome_user").innerHTML = sessionStorage.NOME_USUARIO
    window.onload = function () {
        validarSessaoUsuario();
        carregarDados();
    };

    window.addEventListener("resize", function () {
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        var sidebar = document.getElementById("nav_lateral")

        if (window.innerWidth > 900) {
            if (fundo_cinza_sidebar.classList.contains("mobile")) {
                console.log("Tem a classe mobile");
                sidebar.classList.toggle("mobile")
                fundo_cinza_sidebar.classList.toggle("mobile")
            }
        }
    });

    function abrirSideBarMobile() {
        var sidebar = document.getElementById("nav_lateral")
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
    }
    function fecharSidebar() {
        var sidebar = document.getElementById("nav_lateral")
        var conteudo = document.getElementById("conteudo_pagina")
        sidebar.classList.toggle("compactada")
        conteudo.classList.toggle("expandido")
    }
</script>

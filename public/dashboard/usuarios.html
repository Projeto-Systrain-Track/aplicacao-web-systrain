<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sys Train Track | Dashboard</title>
    <link rel="icon" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="estilo.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/sessao.js"></script>

    <style>
        body {
            background-color: #f5f7fa !important;
        }

        .conteudo {
            background-color: #f5f7fa;
        }
    </style>
</head>

<body>
    <div class="container-sys">
        <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
        <div class="nav-hamburguer">
            <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
            <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
                onclick="abrirSideBarMobile()">
        </div>

        <aside class="nav-lateral desktop" id="nav_lateral">
            <div class="cont-icon-sidebar">
                <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
            </div>
            <div class="logo">
                <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
            </div>

            <nav class="links" id="links_sidebar">
                <a class="link-lateral" href="dashboard.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>
                </a>
                <a class="link-lateral" href="linhas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>
                </a>
                <a class="link-lateral" href="servidores.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>
                </a>
                <a class="link-lateral" href="incidentes.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Incidentes</span>
                </a>
                <a class="link-lateral" href="relatorios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
                    <span>Relatórios</span>
                </a>
                <a class="link-lateral ativo" href="#">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuários</span>
                </a>
            </nav>

            <div class="opcoes">
                <div class="btn-lateral usuario">
                    <img src="../assets/icons/icon-avatar-masc.png" alt="">
                    <div class="cont-user">
                        <p id="cargo_user"></p>
                        <p id="nome_user"></p>
                    </div>

                </div>
                <button onclick="limparSessao()" class="btn-lateral">
                    <img src="../assets/icons/icon-logout-white.png" alt="">
                    <p>Sair</p>
                </button>
            </div>
        </aside>


        <main class="conteudo" id="conteudo_pagina">
            <section class="topo-pagina">
                <div>
                    <p class="subtitulo">Sessão do Gestor</p>
                    <h1 class="titulo">Usuários cadastrados</h1>
                    <p class="descricao">Gerenciamento dos usuários da sua empresa</p>
                </div>
                <div id="solicita_gestor" class="solicita-gestor">
                    <button class="btn-padrao" onclick="abrirModal()">
                        <img src="../assets/icons/adicionar.png" alt="">
                        Cadastrar usuário
                    </button>
                </div>
            </section>
            <section class="painel-mapa">
                <table class="tabela-linhas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Cargo</th>
                            <th>Empresa</th>
                        </tr>
                    </thead>

                    <tbody id="tabelaUsuario">

                    </tbody>
                </table>
            </section>
        </main>
        <div class="modal fade" id="modal_cadastro" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">Adicionar Usuário</h1>
                        <button type="button" class="btn-close bg-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="cadastro">
                            <div class="w-100">
                                <label>Nome Completo:</label>
                                <input id="nome_input" type="text" placeholder="Seu nome" />
                            </div>
                            <div class="ipt-50">
                                <label>E-mail:</label>
                                <input id="email_input" class="w-90" type="text" placeholder="meuemail@provedor.com" />
                            </div>
                            <div class="ipt-50">
                                <label>Tipo de usuário:</label>
                                <select name="tipo_usuario" id="tipo_usuario_select">
                                    <option value="Gerente de operações">Gerente de operações</option>
                                    <option value="Operador de redes">Operador de redes</option>
                                    <option value="Coordenador de incidentes">Coordenador de incidentes</option>
                                </select>
                            </div>
                            <div class="ipt-50">
                                <label>Empresa:</label>
                                <select class="h-100" id="select_fk_empresa"></select>
                            </div>
                            <div class="ipt-50">
                                <label>Senha:</label>
                                <input id="senha_input" class="w-90" type="password" placeholder="******" />
                            </div>
                            <div class="ipt-50">
                                <label>Confirmação da Senha:</label>
                                <input id="confirmacao_senha_input" class="w-90" type="password" placeholder="******" />
                            </div>
                            <div id="div_msg"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="cadastrar()">Cadastrar</button>
                    </div>
                </div>
            </div>
        </div>
</body>
<script>
    document.getElementById("select_fk_empresa").innerHTML = `
            <option value="${sessionStorage.ID_EMPRESA}">${sessionStorage.NOME_EMPRESA}</option>
        `
    function validarTipoUsuario() {
        var links_sidebar = document.getElementById("links_sidebar")
        if (sessionStorage.TIPO_USUARIO == "Gerente de operações") {
            
            links_sidebar.innerHTML = `
                <a class="link-lateral " href="dashboard.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>
                </a>
                <a class="link-lateral" href="linhas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>
                </a>
                <a class="link-lateral" href="servidores.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>
                </a>
                <a class="link-lateral" href="incidentes.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Incidentes</span>
                </a>
                <a class="link-lateral" href="relatorios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-relatorio-white.png" alt="">
                    <span>Relatórios</span>
                </a>
                <a class="link-lateral ativo" href="usuarios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuários</span>
                </a>
        
              `
            setTimeout(() => {
                document.getElementById("container_sys").style.display = "flex"
                document.getElementById("loading").style.display = "none"
            }, 500);

        } else if (sessionStorage.TIPO_USUARIO == "Operador" || sessionStorage.TIPO_USUARIO == "Coordenador de incidentes") {
            setTimeout(() => {
                window.location = "dashboard.html"
            }, 500);
        } else {
            window.location = "../index.html"
        }
    }
    validarTipoUsuario()
    const modalCad = new bootstrap.Modal("#modal_cadastro")

    function abrirModal() {
        modalCad.show();
        listarEmpresas()
    }
    document.getElementById("cargo_user").innerHTML = sessionStorage.TIPO_USUARIO
    document.getElementById("nome_user").innerHTML = sessionStorage.NOME_USUARIO
    window.addEventListener("resize", function () {
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        var sidebar = document.getElementById("nav_lateral")

        if (window.innerWidth > 900) {
            if (fundo_cinza_sidebar.classList.contains("mobile")) {
                console.log("Tem a classe mobile");
                sidebar.classList.toggle("mobile")
                fundo_cinza_sidebar.classList.toggle("mobile")
            }
        }
    });

    function abrirSideBarMobile() {
        var sidebar = document.getElementById("nav_lateral")
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
    }
    function fecharSidebar() {

        var sidebar = document.getElementById("nav_lateral")
        var conteudo = document.getElementById("conteudo_pagina")
        sidebar.classList.toggle("compactada")
        conteudo.classList.toggle("expandido")
    }

    function cadastrar() {
        var nomeVar = nome_input.value;
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        var tipoUsuarioVar = tipo_usuario_select.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;
        var idEmpresaVincular = select_fk_empresa.value;



        // Verificando se há algum campo em branco
        if (
            nomeVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            tipoUsuarioVar == "" ||
            confirmacaoSenhaVar == "" ||
            idEmpresaVincular == 0
        ) {
            console.log("Campo esta vazio")
            return false;
        }

        // Enviando o valor da nova input
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
                tipoUsuarioServer: tipoUsuarioVar,
                idEmpresaVincularServer: idEmpresaVincular,

            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    limparFormulario();
                    modalCad.hide()
                    listarUsuarios()
                    // finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;
    }

    function listarUsuarios() {
        var cont = 0
        var usuariosCadastrados = ''
        var tabela = document.getElementById("tabelaUsuario")
        fetch(`/usuarios/listarUsuarios/${sessionStorage.ID_EMPRESA}`, {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((usuarios) => {
                    usuarios.forEach(usuario => {
                        usuariosCadastrados += `
                                 <tr class="table-secondary">
                                    <th scope="row">${usuario.idUsuario}</th>
                                    <td>${usuario.nome}</td>
                                    <td>${usuario.email}</td>
                                    <td>${usuario.tipoUsuario}</td>
                                    <td>${usuario.empresa}</td>
                                    </tr>
                        `

                    });
                    tabela.innerHTML = usuariosCadastrados
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            })
    }

    function limparFormulario() {
        nome_input.value = "";
        email_input.value = "";
        senha_input.value = "";
        confirmacao_senha_input.value = "";
        select_fk_empresa.selectIndex = 0;
    }

    listarUsuarios()
</script>

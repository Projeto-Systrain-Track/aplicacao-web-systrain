<script>
    validarSessaoAdm();
    listarDuvidas();

    function listarDuvidas() {
        fetch("/adm/listarDuvidas", {
            method: "GET"
        })
        .then(function (resposta) {
            console.log("resposta:", resposta);

            if (resposta.ok) {
                resposta.json().then(function (duvidas) {
                    var conteudo = "";

                    if (duvidas.length == 0) {
                        conteudo = `
                            <div class="card-duvida vazio">
                                <h2>Nenhuma dúvida encontrada</h2>
                                <p>Ainda não há mensagens enviadas pelo formulário.</p>
                            </div>
                        `;
                    } else {
                        duvidas.forEach(function (duvida) {
                            conteudo += `
                                <div class="card-duvida">
                                    <div class="topo-card-duvida">
                                        <div class="badge-duvida">Contato</div>
                                        <span class="id-duvida">#${duvida.idMensagem}</span>
                                    </div>

                                    <div class="conteudo-duvida">
                                        <div class="bloco-info-duvida">
                                            <p class="label-duvida">Email</p>
                                            <p class="valor-duvida">${duvida.emailContato}</p>
                                        </div>

                                        <div class="bloco-info-duvida">
                                            <p class="label-duvida">Dúvida</p>
                                            <p class="mensagem-duvida">${duvida.mensagem}</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    lista_duvidas.innerHTML = conteudo;
                });
            } else {
                throw "Erro ao buscar dúvidas";
            }
        })
        .catch(function (erro) {
            console.log("#ERRO:", erro);
            lista_duvidas.innerHTML = `
                <div class="card-duvida vazio">
                    <h2>Erro ao carregar</h2>
                    <p>Não foi possível buscar as dúvidas no momento.</p>
                </div>
            `;
        });
    }
</script>

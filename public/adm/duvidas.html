<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sys Train Track Adm | Dúvidas</title>
    <link rel="icon" href="../assets/icons/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/adm.css" />
    <script src="../js/sessao.js"></script>
</head>

<body>
    <div class="container-sys">
        <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
        <div class="nav-hamburguer">
            <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
            <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
                onclick="abrirSideBarMobile()">
        </div>
        <aside class="nav-lateral desktop" id="nav_lateral">
            <div class="cont-icon-sidebar">
                <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
            </div>
            <div class="logo">
                <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
            </div>
            <nav class="links" id="links_sidebar">
                <a class="link-lateral" href="home.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>

                </a>
                <a class="link-lateral" href="empresas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-empresa-white.png" alt="">
                    <span>Empresas</span>

                </a>
                <a class="link-lateral" href="linha.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>

                </a>
                <a class="link-lateral" href="rbc.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>

                </a>
                <a class="link-lateral ativo" href="duvidas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Dúvidas</span>

                </a>
                <a class="link-lateral" href="usuarios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuário</span>
                </a>

            </nav>

            <div class="opcoes">
                <div class="btn-lateral usuario">
                    <img src="../assets/icons/icon-avatar-masc.png" alt="">
                    <div class="cont-user">
                        <p id="cargo_user"></p>
                        <p id="nome_user"></p>
                    </div>

                </div>
                <button onclick="limparSessao()" class="btn-lateral">
                    <img src="../assets/icons/icon-logout-white.png" alt="">
                    <p>Sair</p>
                </button>
            </div>
        </aside>

        <main class="conteudo" id="conteudo_pagina">
            <section class="topo-pagina">
                <div>
                    <p class="subtitulo">Sessão Administrativa</p>
                    <h1 class="titulo">Dúvidas Recebidas</h1>
                    <p class="descricao">Visualização das mensagens enviadas pelo formulário Fale Conosco</p>
                </div>
            </section>

            <section class="painel-tabela">
                <div class="painel-duvidas" id="lista_duvidas">
                    <!-- cards renderizados aqui -->
                </div>
            </section>
        </main>
    </div>
</body>

</html>

<script>
    validarSessaoAdm();
    listarDuvidas();
    document.getElementById("cargo_user").innerHTML = `Adm nível ${sessionStorage.NIVEL_ADM}`
    document.getElementById("nome_user").innerHTML = sessionStorage.NOME_ADM
    window.addEventListener("resize", function () {
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        var sidebar = document.getElementById("nav_lateral")

        if (window.innerWidth > 900) {
            if (fundo_cinza_sidebar.classList.contains("mobile")) {
                console.log("Tem a classe mobile");
                sidebar.classList.toggle("mobile")
                fundo_cinza_sidebar.classList.toggle("mobile")
            }
        }
    });

    function abrirSideBarMobile() {
        var sidebar = document.getElementById("nav_lateral")
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
    }
    function fecharSidebar() {

        var sidebar = document.getElementById("nav_lateral")
        var conteudo = document.getElementById("conteudo_pagina")
        sidebar.classList.toggle("compactada")
        conteudo.classList.toggle("expandido")
    }
    function listarDuvidas() {
        fetch("/adm/listarDuvidas", {
            method: "GET"
        })
            .then(function (resposta) {
                console.log("resposta:", resposta);

                if (resposta.ok) {
                    resposta.json().then(function (duvidas) {
                        var conteudo = "";

                        if (duvidas.length == 0) {
                            conteudo = `
                            <div class="card-duvida vazio">
                                <h2>Nenhuma dúvida encontrada</h2>
                                <p>Ainda não há mensagens enviadas pelo formulário.</p>
                            </div>
                        `;
                        } else {
                            duvidas.forEach(function (duvida) {
                                conteudo += `
                                <div class="card-duvida">
                                    <div class="topo-card-duvida">
                                        <div class="badge-duvida">Contato</div>
                                        <span class="id-duvida">#${duvida.idMensagem}</span>
                                    </div>

                                    <div class="conteudo-duvida">
                                        <div class="bloco-info-duvida">
                                            <p class="label-duvida">Email</p>
                                            <p class="valor-duvida">${duvida.emailContato}</p>
                                        </div>

                                        <div class="bloco-info-duvida">
                                            <p class="label-duvida">Dúvida</p>
                                            <p class="mensagem-duvida">${duvida.mensagem}</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                            });
                        }

                        lista_duvidas.innerHTML = conteudo;
                    });
                } else {
                    throw "Erro ao buscar dúvidas";
                }
            })
            .catch(function (erro) {
                console.log("#ERRO:", erro);
                lista_duvidas.innerHTML = `
                <div class="card-duvida vazio">
                    <h2>Erro ao carregar</h2>
                    <p>Não foi possível buscar as dúvidas no momento.</p>
                </div>
            `;
            });
    }
</script>

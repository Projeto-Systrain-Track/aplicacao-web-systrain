                            </select>

<script>
    listarRBC()
    listarEmpresas()
    const modalCad = new bootstrap.Modal("#modal_cadastro")

    function abrirModal() {
        modalCad.show();
    }

    function listarRBC() {
        var cont = 0
        var rbcsCadastrados = ''
        console.log("Buscando RBC:")
        var tabela = document.getElementById("tabelaRbc")
        fetch("/rbcs/listarRBC", {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((rbcs) => {
                    rbcs.forEach(rbc => {
                        cont++
                        if (cont % 2 == 0) {
                            rbcsCadastrados += `
                                 <tr class="table-secondary">
                                    <th scope="row">${rbc.idRbc}</th>
                                    <td>${rbc.modelo}</td>
                                    <td>${rbc.versao}</td>
                                    <td>${rbc.empresa}</td>
                                    <td>${rbc.linha}</td>
                                </tr>
                            `
                        } else {
                            rbcsCadastrados += `
                                 <tr>
                                    <th scope="row">${rbc.idRbc}</th>
                                    <td>${rbc.modelo}</td>
                                    <td>${rbc.versao}</td>
                                    <td>${rbc.empresa}</td>
                                    <td>${rbc.linha}</td>
                                </tr>
                            `
                        }
                    })
                    tabela.innerHTML = rbcsCadastrados
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }
    function cadastrar() {
        //Recupere o valor da nova input pelo nome do id
        // Agora vá para o método fetch logo abaixo
        var modelo = input_modelo.value
        var versao = input_versao.value
        var linhaResp = input_linha_resp.value
        var fkEmpresa = select_fk_empresa.value

        // Verificando se há algum campo em branco
        if (
            modelo == '' ||
            versao == '' ||
            linhaResp == '' ||
            fkEmpresa == 0
        ) {
            alert('Mensagem de erro para todos os campos em branco');
        }
        console.log(fkEmpresa)
        // Enviando o valor da nova input
        fetch("/rbcs/cadastrarRbc", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                modeloServer: modelo,
                versaoServer: versao,
                linhaRespServer: linhaResp,
                fkEmpresaServer: fkEmpresa
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    modalCad.hide()
                    limparFormulario();
                    listarRBC();
                    status("Sucesso")
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do RBC!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;
    }

    // Listando empresas cadastradas 
    function listarEmpresas() {
        var listaEmpresas = '<option value="0" selected disabled>Escolha a empresa</option>';
        var cont = 0;
        var selectEmpresa = document.getElementById("select_fk_empresa")
        fetch("/empresas/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((empresas) => {
                    empresas.forEach(empresa => {
                        cont++
                        console.log(empresa)
                        listaEmpresas += `
                            <option value="${empresa.idEmpresa}">${empresa.razaoSocial}</option>
                        `
                    });
                    selectEmpresa.innerHTML = listaEmpresas
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function limparFormulario() {
        input_modelo.value = ''
        input_versao.value = ''
        input_linha_resp.value = ''
        select_fk_empresa.value = ''
    }

    function status(statusOperacao) {
        mensagem_operacao.styele.display = "block"
        if (statusOperacao == "Sucesso") {
            cor_status.style.background = "#2DE846"
            img_status.src = "../assets/icons/sucesso.png"
            mensagem_operacao.innerHTML = "Cadastro realizado com sucesso "
        } else {
            cor_status.style.background = "#FC5C65"
            img_status.src = "../assets/icons/erro.png"
            mensagem_operacao.innerHTML = "Erro ao cadastrar"
        }
        setInterval(() => {
            mensagem_operacao.styele.display = "none"
        }, 3000)
    }


</script>

<body>
    <label>Modelo</label>
    <input type="text" id="input_modelo" placeholder="Modelo XPTO">
    <label>Versão</label>
    <input type="text" id="input_versao" placeholder="V2">
    <label>linha</label>
    <input type="text" id="input_linha_resp" placeholder="11 Coral">
    <label type="">Empresa</label>
    <select id="select_fk_empresa">
    </select>
    <button onclick="cadastrar()">Cadastrar</button>
</body>
</html>
<script>
    listarEmpresas()
    function cadastrar() {
        //Recupere o valor da nova input pelo nome do id
        // Agora vá para o método fetch logo abaixo
        var modelo = input_modelo.value
        var versao = input_versao.value
        var linhaResp = input_linha_resp.value
        var fkEmpresa = select_fk_empresa.value

        // Verificando se há algum campo em branco
        if (
            modelo == '' ||
            versao == '' ||
            linhaResp == '' ||
            fkEmpresa == 0
        ) {
            alert('Mensagem de erro para todos os campos em branco');
        }
        console.log(fkEmpresa)
        // Enviando o valor da nova input
        fetch("/rbcs/cadastrarRbc", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                modeloServer : modelo,
                versaoServer : versao,
                linhaRespServer: linhaResp,
                fkEmpresaServer: fkEmpresa
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                        window.location.reload()
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do RBC!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;
    }

    function listarEmpresas(){
        var listaEmpresas = '<option value="0" selected disabled>Escolha a empresa</option>';
        var cont = 0;
        var selectEmpresa = document.getElementById("select_fk_empresa")
        fetch("/empresas/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((empresas) => {
                    empresas.forEach(empresa => {
                        cont ++
                        console.log(empresa)
                        listaEmpresas += `
                            <option value="${empresa.idEmpresa}">${empresa.razaoSocial}</option>
                        `
                    });
                    selectEmpresa.innerHTML = listaEmpresas
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    // Listando empresas cadastradas

    }

</script>

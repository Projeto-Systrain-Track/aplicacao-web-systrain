<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysTrain Track | Administrativo</title>
    <link rel="icon" href="../assets/icons/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/adm.css" />
    <script src="../js/sessao.js"></script>
</head>

<body>
    <div class="container-sys">
        <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
        <div class="nav-hamburguer">
            <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
            <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
                onclick="abrirSideBarMobile()">
        </div>
        <aside class="nav-lateral desktop" id="nav_lateral">
            <div class="cont-icon-sidebar">
                <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
            </div>
            <div class="logo">
                <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
            </div>
            <nav class="links" id="links_sidebar">
                <a class="link-lateral" href="home.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>

                </a>
                <a class="link-lateral" href="empresas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-empresa-white.png" alt="">
                    <span>Empresas</span>

                </a>
                <a class="link-lateral" href="linha.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>

                </a>
                <a class="link-lateral ativo" href="rbc.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>

                </a>
                <a class="link-lateral" href="duvidas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Dúvidas</span>

                </a>
                <a class="link-lateral" href="usuarios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuário</span>
                </a>

            </nav>

            <div class="opcoes">
                <div class="btn-lateral usuario">
                    <img src="../assets/icons/icon-avatar-masc.png" alt="">
                    <div class="cont-user">
                        <p id="cargo_user"></p>
                        <p id="nome_user"></p>
                    </div>

                </div>
                <button onclick="limparSessao()" class="btn-lateral">
                    <img src="../assets/icons/icon-logout-white.png" alt="">
                    <p>Sair</p>
                </button>
            </div>
        </aside>
        <main class="conteudo" id="conteudo_pagina">
            <section class="topo-pagina">
                <div>
                    <p class="subtitulo">Sessão Administrativa</p>
                    <h1 class="titulo">RBCs Cadastradas</h1>
                    <p class="descricao">Gerenciamento dos RBCs cadastradas</p>
                </div>
                <!-- <button class="btn-add-desk desktop" data-bs-toggle="modal" data-bs-target="#staticBackdrop"> -->
                <button class="btn-add-desk desktop" onclick="abrirModal()">
                    <div>
                        <p>Adicionar RBC</p>
                    </div>
                </button>
            </section>
            <section class="painel-tabela">
                <div class="tabela table-responsive">
                    <span class="subtitulo">Lista dos RBCs</span>
                    <table class="tabela-adm">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nome do servidor</th>
                                <th scope="col">Linha</th>
                                <th scope="col">Empresa responsável</th>
                                <th scope="col">Trecho</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaRbc">

                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <form id="form_cadastro_rbc">
        <div class="modal fade " id="modal_cadastro" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">Adicionar RBC</h1>
                        <button type="button" class="btn-close bg-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="cadastro">
                            <div class="w-100 m-1">
                                <label>Nome de servidor</label>
                                <input type="text" id="input_servidor" required placeholder="Insira o nome do servidor:"
                                    name="nome_servidor">
                            </div>
                            <div class="w-100 m-1">
                                <label>MAC Address</label>
                                <input type="text" id="input_mac" required placeholder="Insira o MAC do servidor:"
                                    name="mac_address">
                            </div>

                            <div class="ipt-50">
                                <label>Linha</label>
                                <select class="w-90 h-100" id="select_linha" name="linha_responsavel" required
                                    onchange="inserirEmpresa()">
                                </select>
                            </div>

                            <div class="ipt-50">
                                <label>Empresa</label>
                                <select class="h-100" id="select_id_empresa" name="empresa_responsavel"
                                    required></select>
                            </div>

                            <div class="w-100" id="cont_componentes">
                                <label>Componente</label>

                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                            onclick="fecharModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Cadastrar</button>
                    </div>

                </div>
            </div>
        </div>
    </form>


</body>

</html>
<script>
    validarSessaoAdm()
    listarRBC()
    document.getElementById("cargo_user").innerHTML = `Adm nível ${sessionStorage.NIVEL_ADM}`
    document.getElementById("nome_user").innerHTML = sessionStorage.NOME_ADM
    window.addEventListener("resize", function () {
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        var sidebar = document.getElementById("nav_lateral")

        if (window.innerWidth > 900) {
            if (fundo_cinza_sidebar.classList.contains("mobile")) {
                console.log("Tem a classe mobile");
                sidebar.classList.toggle("mobile")
                fundo_cinza_sidebar.classList.toggle("mobile")
            }
        }
    });

    function abrirSideBarMobile() {
        var sidebar = document.getElementById("nav_lateral")
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
    }
    function fecharSidebar() {

        var sidebar = document.getElementById("nav_lateral")
        var conteudo = document.getElementById("conteudo_pagina")
        sidebar.classList.toggle("compactada")
        conteudo.classList.toggle("expandido")
    }
    var linhasListadas = []
    var empresasListadas = []

    const modalCad = new bootstrap.Modal("#modal_cadastro")

    function abrirModal() {
        modalCad.show();
        listarLinhas()
        listarComponentes()
    }


    function listarRBC() {
        var cont = 0
        var rbcsCadastrados = ''
        console.log("Buscando RBC:")
        var tabela = document.getElementById("tabelaRbc")
        fetch("/rbcs/listarRBC", {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((rbcs) => {
                    rbcs.forEach(rbc => {
                        rbcsCadastrados += `
                             <tr>
                                <th scope="row">${rbc.idRbc}</th>
                                <td>${rbc.nomeServidor}</td>
                                <td>
                                     <div class="cont-linha-rbc"><div class="circulo-cor-linha" style="background-color: ${rbc.corLinha};"></div>Linha ${rbc.numeroLinha} - ${rbc.nomeLinha}</div>
                                </td>
                                <td>${rbc.empresa}</td>
                                <td>${rbc.trecho}</td>
                            </tr>
                        `
                    })
                    tabela.innerHTML = rbcsCadastrados
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function inserirEmpresa() {
        var idLinha = select_linha.value
        var selectEmpresa = document.getElementById("select_id_empresa")
        console.log("INSERIR ", idLinha, linhasListadas, empresasListadas);
        for (var i = 0; i < linhasListadas.length; i++) {
            var linha_atual = linhasListadas[i];
            if (linha_atual[0] == idLinha) {
                var idEmpresa = linha_atual[1]
                selectEmpresa.innerHTML = `
                        <option selected value="${linha_atual[1]}">${linha_atual[2]}</option>
                `
            }
        }
    }

    function listarComponentes() {
        var componentesCadastrados = ""
        var cont_componentes = document.getElementById("cont_componentes")

        fetch("/componentes/listarComponentes", {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((componentes) => {
                    componentes.forEach(componente => {
                        componentesCadastrados += `
                            <div class="d-flex flex-row">
                                <input type="text" value="${componente.idComponente}" name="${componente.campoWeb}_id_${componente.idComponente}" readonly class="ipt-10 h-100 m-1">
                                <input type="text" value="${componente.tipo}" readonly class="ipt-25 h-100 m-1">
                                <input type="text" value="${componente.parametros} (${componente.unidadeMedida})" readonly class="ipt-50 h-100 m-1">
                                <input class="h-100 ipt-25 m-1" name="${componente.campoWeb}_limite" required placeholder="Insira um limite: ">
                            </div>
                        `
                    })
                    cont_componentes.innerHTML = componentesCadastrados
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function listarLinhas() {
        var linhasCadastradas = ''
        console.log("Buscando RBC:")
        fetch("/linha/listar", {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((linhas) => {
                    console.log(linhas);
                    var listaLinhas = linhas.listaLinhas
                    linhasCadastradas = `<option disabled selected value="#">Escolha a linha</option>`
                    listaLinhas.forEach(linha => {
                        linhasCadastradas += `
                                <option value="${linha.idLinha}">Linha ${linha.numeroLinha} - ${linha.nomeLinha}</option>
                        `
                        linhasListadas.push([linha.idLinha, linha.fkEmpresa, linha.nomeEmpresa])
                    })
                    document.getElementById("select_linha").innerHTML = linhasCadastradas
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    document.getElementById("form_cadastro_rbc")
        .addEventListener("submit", function (eventoDeEnviar) {
            eventoDeEnviar.preventDefault();
            cadastrar();
        }
        );

    function cadastrar() {
        var formulario = document.getElementById("form_cadastro_rbc");
        var dadosDoFormulario = new FormData(formulario)
        var objetoFormulario = Object.fromEntries(dadosDoFormulario)

        console.log(objetoFormulario);

        console.log("objetoFormulario: ", objetoFormulario);

        fetch("/rbcs/cadastrarRbc", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                objetoFormularioServer: objetoFormulario,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    modalCad.hide()
                    listarRBC();
                    // status("Sucesso")
                    formulario.reset()
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do RBC!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;
    }


    function status(statusOperacao) {
        mensagem_operacao.styele.display = "block"
        if (statusOperacao == "Sucesso") {
            cor_status.style.background = "#2DE846"
            img_status.src = "../assets/icons/sucesso.png"
            mensagem_operacao.innerHTML = "Cadastro realizado com sucesso "
        } else {
            cor_status.style.background = "#FC5C65"
            img_status.src = "../assets/icons/erro.png"
            mensagem_operacao.innerHTML = "Erro ao cadastrar"
        }
        setInterval(() => {
            mensagem_operacao.styele.display = "none"
        }, 3000)
    }


</script>

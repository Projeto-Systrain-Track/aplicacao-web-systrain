<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysTrain Track | Administrativo</title>
    <link rel="icon" href="../assets/icons/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/adm.css" />
    <script src="../js/sessao.js"></script>
</head>

<body>


    <div class="container-sys">

        <div id="fundo_cinza_sidebar" onclick="abrirSideBarMobile()"></div>
        <div class="nav-hamburguer">
            <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-nav-hamburguer">
            <img src="../assets/icons/icon-menu-white.png" alt="Sys-train track" class="icon-menu"
                onclick="abrirSideBarMobile()">
        </div>
        <aside class="nav-lateral desktop" id="nav_lateral">
            <div class="cont-icon-sidebar">
                <img src="../assets/icons/icon-sidebar-white.png" id="icone-sidebar" onclick="fecharSidebar()" alt="">
            </div>
            <div class="logo">
                <img src="../assets/images/sys-logo - adm2.svg" alt="Sys-train track" class="logo-sidebar">
            </div>
            <nav class="links" id="links_sidebar">
                <a class="link-lateral" href="home.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-home-white.png" alt="">
                    <span>Visão geral</span>

                </a>
                <a class="link-lateral" href="empresas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-empresa-white.png" alt="">
                    <span>Empresas</span>

                </a>
                <a class="link-lateral ativo" href="linha.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-linha-white.png" alt="">
                    <span>Linhas</span>

                </a>
                <a class="link-lateral" href="rbc.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-servidor-white.png" alt="">
                    <span>Servidores</span>

                </a>
                <a class="link-lateral" href="duvidas.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-alert-white.png" alt="">
                    <span>Dúvidas</span>

                </a>
                <a class="link-lateral" href="usuarios.html">
                    <img class="icon-sidebar" src="../assets/icons/icon-usuario-white.png" alt="">
                    <span>Usuário</span>
                </a>

            </nav>

            <div class="opcoes">
                <div class="btn-lateral usuario">
                    <img src="../assets/icons/icon-avatar-masc.png" alt="">
                    <div class="cont-user">
                        <p id="cargo_user"></p>
                        <p id="nome_user"></p>
                    </div>

                </div>
                <button onclick="limparSessao()" class="btn-lateral">
                    <img src="../assets/icons/icon-logout-white.png" alt="">
                    <p>Sair</p>
                </button>
            </div>
        </aside>

        <main class="conteudo"  id="conteudo_pagina">
            <section class="topo-pagina">
                <div>
                    <p class="subtitulo">Sessão Administrativa</p>
                    <h1 class="titulo">Linhas Cadastradas</h1>
                    <p class="descricao">Gerenciamento das linhas cadastradas</p>
                </div>
                <!-- <button class="btn-add-desk desktop" data-bs-toggle="modal" data-bs-target="#staticBackdrop"> -->
                <button class="btn-add-desk desktop" onclick="abrirModal()">
                    <div>
                        <p>Adicionar linha</p>
                    </div>
                </button>
            </section>
            <section class="painel-tabela">
                <div class="tabela table-responsive">
                    <span class="subtitulo">Lista das linhas</span>
                    <table class="tabela-adm">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nome da linha</th>
                                <th scope="col">Número da linha</th>
                                <th scope="col">Cor da linha</th>
                                <th scope="col">Empresa</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaRbc"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade " id="modal_cadastro" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Adicionar linha</h1>
                    <button type="button" class="btn-close bg-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="cadastro">
                        <div class="w-50">
                            <label>Nome da linha</label>
                            <input type="text" id="input_nome_linha" placeholder="Esmeralda">
                        </div>
                        <div class="w-50">
                            <label>Trecho</label>
                            <input type="text" id="input_trecho_linha" placeholder="Osasco - Bruno Covas">
                        </div>
                        <div class="ipt-50">
                            <label>Número da linha</label>
                            <input class="w-90-m ipt-mobile-100" type="text" id="input_numero_linha" placeholder="1">
                        </div>
                        <div class="ipt-25">
                            <label>Cor da linha</label>
                            <input type="color" class="w-90-m ipt-mobile-100" id="input_cor_linha"
                                placeholder="Selecione uma cor">
                        </div>
                        <div class="ipt-25 ">
                            <label>Empresa</label>
                            <select class="h-100" id="select_empresa">
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="cadastrar()">Cadastrar</button>
                </div>

            </div>
        </div>
    </div>


</body>

</html>
<script>
    validarSessaoAdm()
    document.getElementById("cargo_user").innerHTML = `Adm nível ${sessionStorage.NIVEL_ADM}`
    document.getElementById("nome_user").innerHTML = sessionStorage.NOME_ADM
    window.addEventListener("resize", function () {
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        var sidebar = document.getElementById("nav_lateral")

        if (window.innerWidth > 900) {
            if (fundo_cinza_sidebar.classList.contains("mobile")) {
                console.log("Tem a classe mobile");
                sidebar.classList.toggle("mobile")
                fundo_cinza_sidebar.classList.toggle("mobile")
            }
        }
    });

    function abrirSideBarMobile() {
        var sidebar = document.getElementById("nav_lateral")
        var fundo_cinza_sidebar = document.getElementById("fundo_cinza_sidebar")
        sidebar.classList.toggle("mobile")
        fundo_cinza_sidebar.classList.toggle("mobile")
    }
    function fecharSidebar() {

        var sidebar = document.getElementById("nav_lateral")
        var conteudo = document.getElementById("conteudo_pagina")
        sidebar.classList.toggle("compactada")
        conteudo.classList.toggle("expandido")
    }

    listarLinhas()
    const modalCad = new bootstrap.Modal("#modal_cadastro")

    function abrirModal() {
        modalCad.show();
        listarEmpresas()
    }

    function listarLinhas() {
        var linhasCadastradas = ''
        console.log("Buscando RBC:")
        var tabela = document.getElementById("tabelaRbc")
        fetch("/linha/listar", {
            method: "GET"
        })
            .then(function (resposta) {
                resposta.json().then((linhas) => {
                    console.log(linhas);
                    var linhasListadas = linhas.listaLinhas

                    linhasListadas.forEach(linha => {
                        linhasCadastradas += `
                             <tr>
                                <th scope="row">${linha.idLinha}</th>
                                <td>${linha.nomeLinha}</td>
                                <td>${linha.numeroLinha}</td>
                                <td><div class="circulo-cor-linha" style="background-color: ${linha.corLinha};"></div></td>
                                <td>${linha.nomeEmpresa}</td>
                            </tr>
                        `
                    })
                    tabela.innerHTML = linhasCadastradas
                })
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }
    function cadastrar() {
        var nome_linha = input_nome_linha.value
        var numero_linha = input_numero_linha.value
        var cor_linha = input_cor_linha.value
        var empresa = select_empresa.value
        var trecho = input_trecho_linha.value

        if (
            nome_linha == '' ||
            numero_linha == '' ||
            cor_linha == '' ||
            empresa == 0 ||
            trecho == ''
        ) {
            alert('Erro ao cadastrar, responda todos os campos');
            return;
        }
        // Enviando o valor da nova input
        fetch("/linha/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nome_linha,
                numeroServer: numero_linha,
                corServer: cor_linha,
                empresaServer: empresa,
                trechoServer: trecho
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                if (resposta.ok) {
                    modalCad.hide()
                    limparFormulario();
                    listarLinhas();
                    // status("Sucesso")
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro das Linhas!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;
    }

    // Listando empresas cadastradas 
    function listarEmpresas() {
        var listaEmpresas = '<option value="0" selected disabled>Escolha a empresa</option>';
        var cont = 0;
        var selectEmpresa = document.getElementById("select_empresa")
        fetch("/empresas/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((empresas) => {
                    empresas.forEach(empresa => {
                        cont++
                        console.log(empresa)
                        listaEmpresas += `
                            <option value="${empresa.idEmpresa}">${empresa.razaoSocial}</option>
                        `
                    });
                    selectEmpresa.innerHTML = listaEmpresas
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function limparFormulario() {
        input_nome_linha.value = ''
        input_numero_linha.value = ''
        select_empresa.selectedIndex = 0
    }

    function status(statusOperacao) {
        mensagem_operacao.style.display = "block"
        if (statusOperacao == "Sucesso") {
            cor_status.style.background = "#2DE846"
            img_status.src = "../assets/icons/sucesso.png"
            mensagem_operacao.innerHTML = "Cadastro realizado com sucesso "
        } else {
            cor_status.style.background = "#FC5C65"
            img_status.src = "../assets/icons/erro.png"
            mensagem_operacao.innerHTML = "Erro ao cadastrar"
        }
        setInterval(() => {
            mensagem_operacao.style.display = "none"
        }, 3000)
    }


</script>
